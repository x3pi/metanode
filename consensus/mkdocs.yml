site_name: Meta Node Consensus Documentation
site_description: Consensus protocol and epoch transition analysis for mtn-consensus.

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details

nav:
  - Trang chủ: index.md
  - Overview:
    - Committee Loading: overview/committee-loading-vi.md
    - Restart Analysis: overview/restart-analysis.md
    - Synchronization Analysis: overview/synchronization-analysis.md
  - Epoch Transition:
    - Boundary Detection: epoch-transition/epoch-boundary-detection-vi.md
    - Fork Prevention: epoch-transition/epoch-transition-fork-prevention-vi.md
    - Fork Prevention Analysis: epoch-transition/fork-prevention-analysis-vi.md
    - Comparison: epoch-transition/comparison-epoch-transition-vi.md
    - SyncOnly to Validator: epoch-transition/synconly-to-validator-transition-vi.md
