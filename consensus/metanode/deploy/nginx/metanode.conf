# /etc/nginx/sites-available/metanode.conf
# ==============================================================================
# MetaNode JSON-RPC Web3 Reverse Proxy with Security Hardening & DDoS Protection
# ==============================================================================

# 1. Rate Limiting Zones
# Limit JSON-RPC endpoints to 20 requests per second per IP (burst up to 50 smoothly).
limit_req_zone $binary_remote_addr zone=rpc_limit:10m rate=20r/s;

# Limit concurrent TCP connections per IP to 10.
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

upstream metanode_rpc {
    # Pointing to Go Sub Node locally (Sub Node handles client reads/TXs)
    # Port 8646 is the default Sub Node 0 RPC.
    server 127.0.0.1:8646;

    # Note: If running a cluster and exposing multiple subs, add them here:
    # server 127.0.0.1:8647;
    # server 127.0.0.1:8648;
}

server {
    # Exposing standard Ethereum/Web3 RPC port safely to the world
    listen 8545;
    listen [::]:8545;
    
    server_name _; 

    # 2. Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # 3. Timeout Hardening (DDoS mitigation - Drop slow-loris attacks)
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # Limits payload size (Blocks massive malicious payloads from exploding unmarshallers)
    client_max_body_size 5M;

    # 4. Proxy Configuration
    location / {
        # Apply Rate Limiting & Connection Limiting
        limit_req zone=rpc_limit burst=50 nodelay;
        limit_conn conn_limit 10;

        # Forward headers for transparency internally
        proxy_pass http://metanode_rpc;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Allows subscriptions & persistent RPC)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Optimize for streaming/RPC
        proxy_buffering off;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
