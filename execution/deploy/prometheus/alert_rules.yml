groups:
  - name: metanode
    rules:
      - alert: BlockStalled
        expr: time() - master_current_block_timestamp > 30
        for: 1m
        labels: 
          severity: critical 
        annotations:
          summary: "Block production stalled"
          description: "No new blocks produced for more than 30s. Consensus may be stalled."

      - alert: TPSDrop
        expr: rate(master_txs_processed_total[5m]) < 1000
        for: 5m
        labels: 
          severity: warning
        annotations:
          summary: "Low TPS detected"

      - alert: HighGoroutineCount
        expr: master_goroutines > 10000
        for: 5m
        labels: 
          severity: warning
        annotations:
           summary: "Goroutine leak possible"

      - alert: EpochTransitionStalled
        expr: time() - master_last_epoch_transition_time_seconds > 60
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Epoch transition taking longer than 60s"
          description: "The node has not completed the epoch transition in 60s."

      - alert: HighMemoryUsage
        expr: (process_resident_memory_bytes / 1024 / 1024 / 1024) > 16
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node using high memory"
          description: "Node is using more than 16GB of RAM."

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host disk space too low"
          description: "Host has less than 10% disk space remaining."

      - alert: HighBlockProcessingTime
        expr: master_block_processing_duration_ms > 500
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High block processing time"

      - alert: NodeOutOfSync
        expr: max(master_current_block_number) - min(master_current_block_number) > 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Nodes in cluster are out of sync by >10 blocks"

      - alert: HighTxPoolBacklog
        expr: master_tx_pool_size > 5000000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Transaction pool backlog exceeds 5M"
