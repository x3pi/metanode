syntax = "proto3";
package cross_chain;
option go_package = "/proto";
option java_package = "com.meta_node.protos.compiled.cross_chain";

// CrossClusterTransferAck represents an acknowledgment for cross-cluster transfer
message CrossClusterTransferAck {
  uint64 nation_id = 1;              // Nation ID cần kiểm tra giao dịch
  string status = 2;
  string error = 3;
  int64 timestamp = 4;
  string type = 5;
  uint64 block_number = 6;
  bytes tx_hash = 7;                 // common.Hash (32 bytes)
  bytes target_tx_hash = 8;          // common.Hash (32 bytes)
  bytes signature = 9;               // Signature bytes
  bytes from_address = 10;          // common.Address (20 bytes) address mint native
}

// BurnPendingTx represents a pending burn transaction for cross-chain transfer
message BurnPendingTx {
  bytes tx_hash = 1;                 // common.Hash (32 bytes)
  bytes from_address = 2;            // common.Address (20 bytes)
  bytes to_address = 3;              // common.Address (20 bytes)
  bytes amount = 4;                  // *big.Int as bytes
  uint64 target_nation_id = 5;
  int64 timestamp = 6;               // Unix timestamp in nanoseconds
  uint64 source_nation_id = 7;
  uint64 block_number = 8;
}

// MintWaitingTx represents a mint transaction waiting for confirmation
message MintWaitingTx {
  bytes mint_tx_hash = 1;            // common.Hash (32 bytes)
  bytes source_tx_hash = 2;          // common.Hash (32 bytes)
  bytes from_address = 3;            // common.Address (20 bytes)
  bytes to_address = 4;              // common.Address (20 bytes)
  bytes amount = 5;                  // *big.Int as bytes
  uint64 target_nation_id = 6;
  uint64 source_nation_id = 7;
  int64 timestamp = 8;               // Unix timestamp in nanoseconds
}

// VerifyTransactionRequest represents a request to verify a transaction
message VerifyTransactionRequest {
  uint64 nation_id = 1;
  uint64 block_number = 2;
  bytes from_address = 3;            // common.Address (20 bytes)
  bytes to_address = 4;              // common.Address (20 bytes)
  bytes amount = 5;                  // *big.Int as bytes
  bytes tx_hash = 6;                 // common.Hash (32 bytes)
}

// NationalCheckpointAck represents acknowledgment for national checkpoint
message NationalCheckpointAck {
  uint64 block_number = 1;
  string status = 2;
  string error = 3;
}

// crosschain contract 
message ContractCrossChainRequest {
  string original_nation_id = 1;
  string target_nation_id= 2;
  string contract_address = 3;
  bytes data = 4;
  string request_id = 5;
  bytes amount = 6;                  // *big.Int as bytes
}

message ContractCrossChainResponse {
  uint64 block_number = 1;
  string status = 2;
  bytes data = 3;
  string error = 4;
  string request_id = 5;
  bytes tx_hash = 6;                 // common.Hash (32 bytes) - transaction hash
  bytes from_address = 7;            // common.Address (20 bytes)
  bytes to_address = 8;              // common.Address (20 bytes)
  bytes amount = 9;                  // *big.Int as bytes
}

message MintData {
  bytes source_tx_hash = 1; // common.Hash (32 bytes)
  bytes signature = 2;      // Signature bytes
}