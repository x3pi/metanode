syntax = "proto3";

package proto;

option go_package = "github.com/meta-node-blockchain/meta-node/pkg/proto";

// NationCheckpoint lưu trữ state root của một nation (chain con) tại một block cụ thể
message NationCheckpoint {
    string nation_id = 1;              // ID của nation (cluster)
    uint64 block_number = 2;           // Block number của nation
    bytes block_hash = 3;              // Hash của block
    bytes parent_hash = 4;             // Hash của block trước (để detect fork)
    bytes account_root = 5;            // Account state root
    bytes transaction_root = 6;        // Transaction root
    bytes receipt_root = 7;            // Receipt root
    uint64 timestamp = 8;              // Timestamp của block
    bytes validator_signature = 9;     // Chữ ký của validator
}

// NationLatestState lưu trữ state root mới nhất của một nation
message NationLatestState {
    string nation_id = 1;
    uint64 latest_block = 2;
    bytes latest_block_hash = 3;
    bytes account_root = 4;
    bytes transaction_root = 5;
    bytes receipt_root = 6;
    uint64 last_update = 7;
    uint64 total_checkpoints = 8;      // Tổng số checkpoints đã nhận
    string last_validator = 9;         // Validator của checkpoint gần nhất
}