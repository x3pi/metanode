<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect x="0" y="0" width="1400" height="900" fill="#0f172a"/>
  <rect x="40" y="30" width="1320" height="80" rx="10" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="70" y="82" font-family="Inter, Arial" font-size="28" fill="#e5e7eb">L1 Co-Sign Dashboard</text>
  <rect x="40" y="130" width="260" height="720" rx="14" fill="#0b1220" stroke="#334155" stroke-width="2"/>
  <text x="70" y="175" font-family="Inter, Arial" font-size="18" fill="#94a3b8">Menu</text>
  <g fill="#e5e7eb" font-family="Inter, Arial" font-size="16">
    <text x="70" y="210">Dashboard</text>
    <text x="70" y="245">Tạo giao dịch</text>
    <text x="70" y="280">Ký ETH</text>
    <text x="70" y="315">Ký BLS (Luồng 2)</text>
    <text x="70" y="350">Ký hộ BLS (Luồng 1)</text>
    <text x="70" y="385">Explorer</text>
    <text x="70" y="420">ECDH</text>
    <text x="70" y="455">Cấu hình tài khoản</text>
  </g>
  <rect x="320" y="130" width="1040" height="720" rx="14" fill="#0b1220" stroke="#334155" stroke-width="2"/>
  <text x="350" y="175" font-family="Inter, Arial" font-size="20" fill="#e5e7eb">Tổng quan</text>
  <g>
    <rect x="350" y="200" width="300" height="140" rx="10" fill="#111827" stroke="#334155"/>
    <text x="370" y="235" font-family="Inter, Arial" font-size="16" fill="#94a3b8">Tài khoản</text>
    <text x="370" y="265" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">accountType: 2 (co-sign)</text>
    <text x="370" y="290" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">BLS key: đăng ký</text>
  </g>
  <g>
    <rect x="680" y="200" width="300" height="140" rx="10" fill="#111827" stroke="#334155"/>
    <text x="700" y="235" font-family="Inter, Arial" font-size="16" fill="#94a3b8">Trạng thái phí</text>
    <text x="700" y="265" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">ME balance (server)</text>
    <text x="700" y="290" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">ETH gas (user)</text>
  </g>
  <g>
    <rect x="1010" y="200" width="320" height="140" rx="10" fill="#111827" stroke="#334155"/>
    <text x="1030" y="235" font-family="Inter, Arial" font-size="16" fill="#94a3b8">Hoạt động gần đây</text>
    <text x="1030" y="265" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">Tx 0xabc... - pending</text>
    <text x="1030" y="290" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">Tx 0xdef... - success</text>
  </g>
  <g>
    <text x="350" y="380" font-family="Inter, Arial" font-size="18" fill="#e5e7eb">Luồng nhanh</text>
    <rect x="350" y="400" width="1000" height="100" rx="10" fill="#111827" stroke="#334155"/>
    <g fill="#38bdf8">
      <rect x="370" y="420" width="220" height="60" rx="8" fill="#0ea5e9"/>
      <text x="395" y="457" font-family="Inter, Arial" font-size="16" fill="#03131f">Tạo & Ký ETH</text>
      <rect x="610" y="420" width="260" height="60" rx="8" fill="#0369a1"/>
      <text x="635" y="457" font-family="Inter, Arial" font-size="16" fill="#03131f">Gửi ký hộ BLS (Luồng 1)</text>
      <rect x="890" y="420" width="220" height="60" rx="8" fill="#155e75"/>
      <text x="915" y="457" font-family="Inter, Arial" font-size="16" fill="#e0f2fe">Broadcast</text>
    </g>
  </g>
  <g>
    <text x="350" y="550" font-family="Inter, Arial" font-size="18" fill="#e5e7eb">Explorer</text>
    <rect x="350" y="570" width="1000" height="260" rx="10" fill="#111827" stroke="#334155"/>
    <text x="370" y="600" font-family="Inter, Arial" font-size="14" fill="#94a3b8">Danh sách giao dịch</text>
    <rect x="370" y="620" width="960" height="190" rx="8" fill="#0b1220" stroke="#334155"/>
    <text x="390" y="660" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">0xabc... | createOrder | pending | nonce: 12 | gas: 21000</text>
    <text x="390" y="690" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">0xdef... | approve | success | block: 123456 | fee: ...</text>
  </g>
</svg>


