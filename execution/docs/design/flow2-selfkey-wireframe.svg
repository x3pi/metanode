<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect x="0" y="0" width="1400" height="900" fill="#0f172a"/>
  <text x="40" y="60" font-family="Inter, Arial" font-size="28" fill="#e5e7eb">Luồng 2: User tự quản lý ETH + BLS, tự trả phí</text>
  <g>
    <rect x="60" y="100" width="400" height="220" rx="12" fill="#111827" stroke="#334155"/>
    <text x="80" y="140" font-family="Inter, Arial" font-size="18" fill="#e5e7eb">Bước 1: Quản lý khóa</text>
    <text x="80" y="170" font-family="Inter, Arial" font-size="14" fill="#94a3b8">- ETH private key</text>
    <text x="80" y="195" font-family="Inter, Arial" font-size="14" fill="#94a3b8">- BLS private key</text>
    <text x="80" y="220" font-family="Inter, Arial" font-size="14" fill="#94a3b8">- Backup & Unlock</text>
  </g>
  <g>
    <rect x="500" y="100" width="400" height="220" rx="12" fill="#111827" stroke="#334155"/>
    <text x="520" y="140" font-family="Inter, Arial" font-size="18" fill="#e5e7eb">Bước 2: Tạo & Ký</text>
    <text x="520" y="170" font-family="Inter, Arial" font-size="14" fill="#94a3b8">- EIP-712 message</text>
    <text x="520" y="195" font-family="Inter, Arial" font-size="14" fill="#94a3b8">- sig_eth + sig_bls</text>
    <text x="520" y="220" font-family="Inter, Arial" font-size="14" fill="#94a3b8">- Estimate gas</text>
  </g>
  <g>
    <rect x="940" y="100" width="400" height="220" rx="12" fill="#111827" stroke="#334155"/>
    <text x="960" y="140" font-family="Inter, Arial" font-size="18" fill="#e5e7eb">Bước 3: Broadcast</text>
    <text x="960" y="170" font-family="Inter, Arial" font-size="14" fill="#94a3b8">- Gửi trực tiếp tới node</text>
    <text x="960" y="195" font-family="Inter, Arial" font-size="14" fill="#94a3b8">- Nhận tx_hash</text>
    <text x="960" y="220" font-family="Inter, Arial" font-size="14" fill="#94a3b8">- Theo dõi receipt</text>
  </g>
  <g stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)">
    <line x1="460" y1="210" x2="500" y2="210"/>
    <line x1="900" y1="210" x2="940" y2="210"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <g>
    <rect x="60" y="360" width="1280" height="480" rx="12" fill="#111827" stroke="#334155"/>
    <text x="80" y="400" font-family="Inter, Arial" font-size="18" fill="#e5e7eb">Wireframe màn hình</text>
    <rect x="80" y="420" width="410" height="380" rx="10" fill="#0b1220" stroke="#334155"/>
    <text x="100" y="455" font-family="Inter, Arial" font-size="16" fill="#94a3b8">Quản lý khóa</text>
    <rect x="100" y="470" width="370" height="60" rx="8" fill="#111827" stroke="#334155"/>
    <text x="115" y="508" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">Import/Generate ETH</text>
    <rect x="100" y="540" width="370" height="60" rx="8" fill="#111827" stroke="#334155"/>
    <text x="115" y="578" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">Import/Generate BLS</text>
    <rect x="100" y="610" width="370" height="50" rx="8" fill="#0ea5e9"/>
    <text x="140" y="642" font-family="Inter, Arial" font-size="16" fill="#03131f">Unlock</text>
    <rect x="520" y="420" width="410" height="380" rx="10" fill="#0b1220" stroke="#334155"/>
    <text x="540" y="455" font-family="Inter, Arial" font-size="16" fill="#94a3b8">Tạo & Ký</text>
    <rect x="540" y="470" width="370" height="70" rx="8" fill="#111827" stroke="#334155"/>
    <text x="555" y="515" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">EIP-712 domain / types / values</text>
    <rect x="540" y="550" width="370" height="50" rx="8" fill="#0ea5e9"/>
    <text x="580" y="582" font-family="Inter, Arial" font-size="16" fill="#03131f">Ký ETH + Ký BLS</text>
    <rect x="980" y="420" width="360" height="380" rx="10" fill="#0b1220" stroke="#334155"/>
    <text x="1000" y="455" font-family="Inter, Arial" font-size="16" fill="#94a3b8">Gửi & Theo dõi</text>
    <rect x="1000" y="470" width="320" height="50" rx="8" fill="#0369a1"/>
    <text x="1070" y="502" font-family="Inter, Arial" font-size="16" fill="#e0f2fe">Broadcast</text>
    <text x="1000" y="540" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">tx_hash: 0x...</text>
    <text x="1000" y="570" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">Explorer link</text>
  </g>
</svg>


