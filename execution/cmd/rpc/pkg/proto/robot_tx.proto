syntax = "proto3";
package proto;

option go_package = "github.com/meta-node-blockchain/meta-node/pkg/proto";

// StoredErrorData lưu thông tin lỗi từ dispatch và processTransactionQueue
message StoredErrorData {
  string tx_hash = 1;                    // Transaction hash (hex string) - dùng làm key
  string input_data = 2;                 // Input data từ dispatch (serialized as JSON string)
  string error_message = 3;              // Mã lỗi hoặc thông báo lỗi
  int64 created_at = 4;                  // Unix timestamp
}

