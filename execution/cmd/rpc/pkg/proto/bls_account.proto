syntax = "proto3";
package proto;

option go_package = "github.com/meta-node-blockchain/meta-node/pkg/proto";
// BlsAccountData lưu thông tin account đã đăng ký BLS
message BlsAccountData {
    bytes address = 1;              // 20 bytes (Ethereum address)
    bytes bls_public_key = 2;       // BLS public key bytes
    int64 registered_at = 3;        // Unix timestamp
    bytes register_tx_hash = 4;     // 32 bytes (transaction hash)
    bool is_confirmed = 5;
    int64 confirmed_at = 6;
    bytes confirm_tx_hash = 7;      // 32 bytes
}
// PendingTransaction lưu giao dịch chưa confirm
message PendingTransaction {
    bytes address = 1;
    bytes bls_public_key = 2;
    string raw_transaction_hex = 3;  // Changed: Lưu hex string thay vì bytes
    int64 created_at = 4;
    uint64 nonce = 5;
    uint64 original_gas_price = 6;
}

message Notification {
    string id = 1;                    // Auto-increment ID (per user)
    bytes account_address = 2;        // Địa chỉ account nhận notification
    string message = 3;                 // Tiêu đề
    int64 created_at = 4;             // Unix timestamp
}

message NotificationList {
    repeated Notification notifications = 1;
    int32 total = 2;
    int32 page = 3;
    int32 page_size = 4;
    int32 total_pages = 5;
}