version: '3.8'

x-metanode-common: &metanode-common
  image: metanode/simple-chain:latest
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  networks:
    - metanode-net
  volumes:
    - type: bind
      source: ./deploy/config
      target: /app/config
      read_only: true
    # Important: Bind mount a Btrfs/XFS volume for O(1) snapshots
    - metanode-data:/app/data

services:
  # === Master Nodes ===
  # Master nodes receive TXs from consensus and execute state transitions
  master-0:
    <<: *metanode-common
    container_name: mtn-master-0
    ports:
      - "8545:8545" # RPC
      - "9001:9001" # P2P Sync
      - "8700:8700" # Snapshot HTTP
    command: ["-config=/app/config/master-0.json"]

  master-1:
    <<: *metanode-common
    container_name: mtn-master-1
    command: ["-config=/app/config/master-1.json"]

  master-2:
    <<: *metanode-common
    container_name: mtn-master-2
    command: ["-config=/app/config/master-2.json"]

  master-3:
    <<: *metanode-common
    container_name: mtn-master-3
    command: ["-config=/app/config/master-3.json"]

  master-4:
    <<: *metanode-common
    container_name: mtn-master-4
    command: ["-config=/app/config/master-4.json"]

  # === Sub Nodes ===
  # Sub nodes receive block batches from masters and serve public RPC queries
  sub-0:
    <<: *metanode-common
    container_name: mtn-sub-0
    ports:
      - "8546:8545" # public RPC
    command: ["-config=/app/config/sub-0.json"]

  sub-1:
    <<: *metanode-common
    container_name: mtn-sub-1
    command: ["-config=/app/config/sub-1.json"]

  sub-2:
    <<: *metanode-common
    container_name: mtn-sub-2
    command: ["-config=/app/config/sub-2.json"]

  sub-3:
    <<: *metanode-common
    container_name: mtn-sub-3
    command: ["-config=/app/config/sub-3.json"]

  sub-4:
    <<: *metanode-common
    container_name: mtn-sub-4
    command: ["-config=/app/config/sub-4.json"]

networks:
  metanode-net:
    driver: bridge

volumes:
  metanode-data:
    driver: local
