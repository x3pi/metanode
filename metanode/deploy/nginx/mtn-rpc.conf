# /etc/nginx/sites-available/mtn-rpc.conf
# ----------------------------------------------------
# Reverse Proxy Configuration for MetaNode RPC & WSS
# ----------------------------------------------------
# ⚠️ This is a template! 
# 1. Replace my-metanode.com with your actual domain
# 2. Setup standard SSL configuration (e.g. via certbot)
# 3. Symlink this to /etc/nginx/sites-enabled/

# Rate Limiting Zone: 50 requests per second per IP
limit_req_zone $binary_remote_addr zone=rpc_limit:10m rate=50r/s;

upstream sub_node_rpc {
    # Replace this with the actual Go Sub-Node URL and RPC port (e.g., 8545)
    server 127.0.0.1:8545;
}

server {
    listen 80;
    server_name my-metanode.com;
    
    # Redirect HTTP to HTTPS
    # return 301 https://$host$request_uri;

    location / {
        # Apply Rate Limiting
        limit_req zone=rpc_limit burst=100 nodelay;

        proxy_pass http://sub_node_rpc;
        
        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket Support (Required for metanode eth_subscribe)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts (Adjust based on long-polling needs)
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        
        # CORS Setup
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
        
        # Handle OPTIONS requests (pre-flight)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
}
