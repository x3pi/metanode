<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect x="0" y="0" width="1400" height="900" fill="#0f172a"/>
  <text x="40" y="60" font-family="Inter, Arial" font-size="28" fill="#e5e7eb">Luồng 1: User ký ETH → Server ký BLS → Broadcast</text>
  <g>
    <rect x="60" y="100" width="380" height="220" rx="12" fill="#111827" stroke="#334155"/>
    <text x="80" y="140" font-family="Inter, Arial" font-size="18" fill="#e5e7eb">Bước 1: Tạo message & Ký ETH</text>
    <text x="80" y="170" font-family="Inter, Arial" font-size="14" fill="#94a3b8">- EIP-712 message</text>
    <text x="80" y="195" font-family="Inter, Arial" font-size="14" fill="#94a3b8">- Tạo sig_eth</text>
    <rect x="80" y="210" width="340" height="90" rx="8" fill="#0b1220" stroke="#334155"/>
    <text x="100" y="240" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">message, sig_eth</text>
  </g>
  <g>
    <rect x="520" y="100" width="380" height="220" rx="12" fill="#111827" stroke="#334155"/>
    <text x="540" y="140" font-family="Inter, Arial" font-size="18" fill="#e5e7eb">Bước 2: Gửi yêu cầu ký hộ BLS</text>
    <text x="540" y="170" font-family="Inter, Arial" font-size="14" fill="#94a3b8">POST /cosign/bls</text>
    <rect x="540" y="190" width="340" height="110" rx="8" fill="#0b1220" stroke="#334155"/>
    <text x="560" y="220" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">Payload: message, sig_eth, user_address, nonce, chainId</text>
  </g>
  <g>
    <rect x="980" y="100" width="360" height="220" rx="12" fill="#111827" stroke="#334155"/>
    <text x="1000" y="140" font-family="Inter, Arial" font-size="18" fill="#e5e7eb">Bước 3: Server ký BLS & Broadcast</text>
    <text x="1000" y="170" font-family="Inter, Arial" font-size="14" fill="#94a3b8">- Xác thực quyền</text>
    <text x="1000" y="195" font-family="Inter, Arial" font-size="14" fill="#94a3b8">- Ký BLS → sig_bls</text>
    <text x="1000" y="220" font-family="Inter, Arial" font-size="14" fill="#94a3b8">- Broadcast → tx_hash</text>
    <rect x="1000" y="235" width="320" height="70" rx="8" fill="#0b1220" stroke="#334155"/>
    <text x="1020" y="260" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">Response: sig_bls, tx_hash</text>
  </g>
  <g stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)">
    <line x1="440" y1="210" x2="520" y2="210"/>
    <line x1="900" y1="210" x2="980" y2="210"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <g>
    <rect x="60" y="360" width="1280" height="480" rx="12" fill="#111827" stroke="#334155"/>
    <text x="80" y="400" font-family="Inter, Arial" font-size="18" fill="#e5e7eb">Chi tiết giao diện (Wireframe)</text>
    <rect x="80" y="420" width="400" height="380" rx="10" fill="#0b1220" stroke="#334155"/>
    <text x="100" y="455" font-family="Inter, Arial" font-size="16" fill="#94a3b8">Form: Tạo message</text>
    <rect x="100" y="470" width="360" height="70" rx="8" fill="#111827" stroke="#334155"/>
    <text x="115" y="515" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">EIP-712 domain / types / values</text>
    <rect x="100" y="550" width="360" height="50" rx="8" fill="#0ea5e9"/>
    <text x="140" y="580" font-family="Inter, Arial" font-size="16" fill="#03131f">Ký ETH</text>
    <rect x="100" y="620" width="360" height="50" rx="8" fill="#0369a1"/>
    <text x="120" y="650" font-family="Inter, Arial" font-size="16" fill="#e0f2fe">Gửi ký hộ BLS</text>
    <rect x="520" y="420" width="820" height="380" rx="10" fill="#0b1220" stroke="#334155"/>
    <text x="540" y="455" font-family="Inter, Arial" font-size="16" fill="#94a3b8">Kết quả</text>
    <text x="540" y="485" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">sig_bls: ...</text>
    <text x="540" y="515" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">tx_hash: 0x...</text>
    <text x="540" y="545" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">Explorer link</text>
  </g>
</svg>


