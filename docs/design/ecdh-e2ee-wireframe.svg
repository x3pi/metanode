<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect x="0" y="0" width="1400" height="900" fill="#0f172a"/>
  <text x="40" y="60" font-family="Inter, Arial" font-size="28" fill="#e5e7eb">ECDH End-to-End Encryption (User ↔ SM)</text>
  <g>
    <rect x="60" y="100" width="600" height="320" rx="12" fill="#111827" stroke="#334155"/>
    <text x="80" y="140" font-family="Inter, Arial" font-size="18" fill="#e5e7eb">User Panel</text>
    <text x="80" y="170" font-family="Inter, Arial" font-size="14" fill="#94a3b8">- Public Key (user): 0x...</text>
    <text x="80" y="195" font-family="Inter, Arial" font-size="14" fill="#94a3b8">- Nhập Public Key (SM)</text>
    <rect x="80" y="215" width="560" height="70" rx="8" fill="#0b1220" stroke="#334155"/>
    <text x="95" y="260" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">SM pubkey: 0x...</text>
    <rect x="80" y="295" width="560" height="50" rx="8" fill="#0ea5e9"/>
    <text x="120" y="327" font-family="Inter, Arial" font-size="16" fill="#03131f">Derive Shared Secret (ECDH)</text>
    <rect x="80" y="355" width="560" height="50" rx="8" fill="#0369a1"/>
    <text x="120" y="387" font-family="Inter, Arial" font-size="16" fill="#e0f2fe">Encrypt Payload (AES-GCM)</text>
  </g>
  <g>
    <rect x="740" y="100" width="600" height="320" rx="12" fill="#111827" stroke="#334155"/>
    <text x="760" y="140" font-family="Inter, Arial" font-size="18" fill="#e5e7eb">SM Panel</text>
    <text x="760" y="170" font-family="Inter, Arial" font-size="14" fill="#94a3b8">- Public Key (SM): 0x...</text>
    <text x="760" y="195" font-family="Inter, Arial" font-size="14" fill="#94a3b8">- Nhập Public Key (user)</text>
    <rect x="760" y="215" width="560" height="70" rx="8" fill="#0b1220" stroke="#334155"/>
    <text x="775" y="260" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">User pubkey: 0x...</text>
    <rect x="760" y="295" width="560" height="50" rx="8" fill="#0ea5e9"/>
    <text x="800" y="327" font-family="Inter, Arial" font-size="16" fill="#03131f">Derive Shared Secret (ECDH)</text>
    <rect x="760" y="355" width="560" height="50" rx="8" fill="#0369a1"/>
    <text x="800" y="387" font-family="Inter, Arial" font-size="16" fill="#e0f2fe">Decrypt Payload (AES-GCM)</text>
  </g>
  <g stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)">
    <line x1="660" y1="250" x2="740" y2="250"/>
    <line x1="740" y1="320" x2="660" y2="320"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <g>
    <rect x="60" y="460" width="1280" height="380" rx="12" fill="#111827" stroke="#334155"/>
    <text x="80" y="500" font-family="Inter, Arial" font-size="18" fill="#e5e7eb">Payload Example (không thật, minh họa)</text>
    <rect x="80" y="520" width="1240" height="300" rx="10" fill="#0b1220" stroke="#334155"/>
    <text x="100" y="560" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">{</text>
    <text x="120" y="585" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">"sender_pub": "0x...",</text>
    <text x="120" y="610" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">"nonce": "base64...",</text>
    <text x="120" y="635" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">"ciphertext": "base64...",</text>
    <text x="120" y="660" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">"tag": "base64..."</text>
    <text x="100" y="685" font-family="Inter, Arial" font-size="14" fill="#e5e7eb">}</text>
  </g>
</svg>


