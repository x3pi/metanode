syntax = "proto3";
package event_log;

option go_package = "/proto";
option java_package = "com.meta_node.protos.compiled.event_log";

message EventLog {
   bytes TransactionHash = 2; 
   bytes Address = 3;
   bytes Data = 4; 
   repeated bytes Topics = 5;
}

message EventLogsHashData {
  repeated bytes Hashes = 1;
}

message EventLogs{
    repeated EventLog EventLogs = 1;
}


// THÊM MESSAGE MỚI NÀY VÀO CUỐI FILE
message MapEventLogs {
  // Key là địa chỉ dạng hex string, value là danh sách các event log
  map<string, EventLogs> events_by_address = 1;
}

// GetLogsRequest - Request để lấy logs theo filter criteria
message GetLogsRequest {
  bytes BlockHash = 1;              // Optional: Hash của block cụ thể
  bytes FromBlock = 2;              // Optional: Block bắt đầu (big.Int encoded)
  bytes ToBlock = 3;                // Optional: Block kết thúc (big.Int encoded)
  repeated bytes Addresses = 4;     // Optional: Danh sách địa chỉ contract cần filter
  repeated TopicFilter Topics = 5;  // Optional: Danh sách topics để filter
}

// TopicFilter - Filter cho một topic position
message TopicFilter {
  repeated bytes Hashes = 1;  // Danh sách các hash có thể cho topic này
}

// GetLogsResponse - Response chứa danh sách logs
message GetLogsResponse {
  repeated LogEntry Logs = 1;  // Danh sách các log entries
  string Error = 2;            // Error message nếu có lỗi
}

// LogEntry - Một entry log từ smart contract
message LogEntry {
  bytes Address = 1;           // Địa chỉ contract phát sinh log
  repeated bytes Topics = 2;   // Danh sách topics
  bytes Data = 3;              // Dữ liệu log
  uint64 BlockNumber = 4;      // Block number chứa log
  bytes TransactionHash = 5;   // Hash của transaction
  bytes BlockHash = 6;         // Hash của block
  uint64 TransactionIndex = 7; // Index của transaction trong block
  uint64 LogIndex = 8;         // Index của log trong transaction
  bool Removed = 9;            // Có bị removed không (reorg)
}
