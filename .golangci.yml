run:
  timeout: 5m
  issues-exit-code: 1

linters:
  disable-all: true
  enable:
    - gofmt
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - typecheck
    - errcheck
    - gosec
    
linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
  gosec:
    excludes:
      - G404 # Use of weak random number generator (math/rand instead of crypto/rand)
      - G104 # Errors unhandled

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
